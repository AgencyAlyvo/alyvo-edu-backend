services:
  alovy_edu_backend_adonisjs:
    container_name: alovy_edu_backend_adonisjs
    image: alovy/edu-backend:develop
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - '3500:3500'
    depends_on:
      alovy_edu_database_postgresql:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://127.0.0.1:3500/'').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      start_period: 120s
      interval: 15s
      timeout: 5s
      retries: 12
    networks:
      - app-network

  alovy_edu_database_postgresql:
    container_name: alovy_edu_database_postgresql
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_DB: alovy_edu_develop
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpassword
    ports:
      - '5433:5432'
    volumes:
      - database_data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U testuser -d alovy_edu_develop']
      start_period: 5s
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  pgadmin_alovy_edu:
    container_name: pgadmin_alovy_edu
    image: dpage/pgadmin4:latest
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@alovy.fr
      PGADMIN_DEFAULT_PASSWORD: root
      PGADMIN_REPLACE_SERVERS_ON_STARTUP: 'True'
    ports:
      - '7090:80'
    volumes:
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      alovy_edu_database_postgresql:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:

volumes:
  database_data:
  node_modules:
